<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PBCamera — Autentificare</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="nav">
    <div class="wrap navWrap">
      <div class="navCenter">
        <button class="navBtn" onclick="location.href='index.html'">Home</button>
        <button class="navBtn" onclick="location.href='contact.html'">Contact</button>
        <button class="navBtn" id="videosNavBtn">Galeria mea</button>
        <button class="navBtn" id="authNavBtn">Login</button>
      </div>
    </div>
  </div>

  <div
    class="wrap"
    style="min-height:calc(100vh - 64px); display:flex; align-items:center; justify-content:center;"
  >
    <div class="card" style="max-width:420px; width:100%;">
      <h2 style="margin-top:0;">Login</h2>

      <form id="loginForm" style="display:grid; gap:10px;">
        <input
          class="input"
          id="loginUsername"
          type="text"
          placeholder="Username"
          required
        />
        <input
          class="input"
          id="loginPassword"
          type="password"
          placeholder="Parolă"
          required
        />
        <button class="btn primary" type="submit">
          Intră în cont
        </button>
      </form>

      <div class="small" style="margin-top:12px;">
        Nu ai cont?
        <a href="register.html"><u>Creează unul aici</u></a>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
