<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PBCamera — Înregistrare</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="nav">
    <div class="wrap navWrap">
      <div class="navCenter">
        <button class="navBtn" onclick="location.href='index.html'">Home</button>
        <button class="navBtn" onclick="location.href='contact.html'">Contact</button>
        <button class="navBtn" id="videosNavBtn">Galeria mea</button>
        <button class="navBtn" id="authNavBtn">Login</button>
      </div>
    </div>
  </div>

  <div
    class="wrap"
    style="min-height:calc(100vh - 64px); display:flex; align-items:center; justify-content:center;"
  >
    <div class="card" style="max-width:520px; width:100%;">
      <h2 style="margin-top:0;">Creează cont</h2>

      <form id="registerForm" style="display:grid; gap:10px;">
        <input class="input" id="regUsername" type="text" placeholder="Username" required />
        <input class="input" id="regEmail" type="email" placeholder="Email" required />
        <input class="input" id="regPassword" type="password" placeholder="Parolă (min. 6)" required />
        <button class="btn primary" type="submit">Creează cont</button>
        <div class="small" id="regStatus">—</div>
      </form>

      <div class="small" style="margin-top:12px;">
        Ai deja cont? <a href="login.html"><u>Intră în cont</u></a>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
